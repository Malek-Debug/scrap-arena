<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <meta name="referrer" content="no-referrer" />
  <meta name="color-scheme" content="dark" />
  <!--
    Best-effort CSP. Allows: self for app code, the YouTube Playables SDK
    domain, inline styles (the bootstrap <style> block below), and data:/blob:
    for canvas/audio resources Phaser creates at runtime.
    NOTE: a CSP delivered via <meta> can be bypassed if the page is reframed by
    an attacker — for full protection serve the same policy as an HTTP header.
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://www.youtube.com 'unsafe-inline' 'wasm-unsafe-eval';
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: blob:;
    media-src 'self' data: blob:;
    font-src 'self' data:;
    connect-src 'self' https: wss:;
    worker-src 'self' blob:;
    object-src 'none';
    base-uri 'self';
    frame-ancestors 'self' https://www.youtube.com https://*.youtube.com https://*.wavedash.games;
    form-action 'none';
  " />
  <title>SCRAP ARENA: THE FRACTURE</title>
  <!--
    YouTube Playables SDK — must load before any game code.
    Safe to include in non-YouTube environments: ytgame will simply be undefined
    and the game guards all calls with typeof ytgame !== "undefined".
  -->
  <script src="https://www.youtube.com/game_api/v1" defer crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000000; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    #game-container { width: 100%; height: 100%; }
    canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
    /* Wallet overlay panel */
    #wallet-panel {
      position: fixed; bottom: 0; right: 0;
      background: rgba(8,4,18,0.92); border: 1px solid #ff5500;
      border-top-left-radius: 8px; padding: 8px 14px;
      font-family: "Courier New", monospace; font-size: 12px;
      color: #ff8800; z-index: 9999; display: none; pointer-events: auto;
      max-width: 280px; word-break: break-all;
    }
    #wallet-panel.visible { display: block; }
    #wallet-panel .w-addr { color: #00ff88; font-size: 11px; margin-top: 4px; }
    #wallet-panel .w-sig  { color: #446622; font-size: 10px; margin-top: 2px; word-break: break-all; }
  </style>
  <script type="module" crossorigin src="/assets/C6OK87af.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/cqcFokov.js">
  <link rel="modulepreload" crossorigin href="/assets/CinXhtVA.js">
</head>
<body>
  <div id="game-container"></div>
  <!-- Wallet notification panel (injected by WalletManager) -->
  <div id="wallet-panel"></div>
</body>
</html>
